<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paisa — आपका पैसा, साफ़ दिखे</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Base palette shared across themes */
    --saffron: #FF6B35;
    --saffron-ink: #E8551F;
    --saffron-pale: #FFF1EB;
    --green: #16A668;
    --green-pale: #E4F6EC;
    --red: #E04B3E;
    --red-pale: #FDECEA;
    --amber: #F5A623;
    --amber-pale: #FFF4E0;

    /* Light theme (default) */
    --bg: #F5F6FA;
    --surface: #FFFFFF;
    --surface-2: #FAFBFD;
    --ink: #0F1226;
    --ink-2: #2B2F4C;
    --muted: #6B7089;
    --hair: #EAECF3;
    --chip: #F1F3F9;
    --navy: #0F1226;

    --shadow-1: 0 1px 2px rgba(15,18,38,.04), 0 2px 8px rgba(15,18,38,.05);
    --shadow-2: 0 4px 16px rgba(15,18,38,.08);
    --shadow-3: 0 12px 36px rgba(15,18,38,.14);
    --r: 20px;
    --rs: 14px;
  }
  [data-theme="dark"] {
    --bg: #0B0D1C;
    --surface: #15182C;
    --surface-2: #1B1F37;
    --ink: #F3F4FA;
    --ink-2: #D7DAE8;
    --muted: #8B90AE;
    --hair: #232744;
    --chip: #1E2240;
    --navy: #000;
    --shadow-1: 0 1px 2px rgba(0,0,0,.3), 0 2px 8px rgba(0,0,0,.35);
    --shadow-2: 0 6px 20px rgba(0,0,0,.4);
    --shadow-3: 0 14px 40px rgba(0,0,0,.55);
  }
  [data-accent="indigo"] { --saffron:#5B6CFF; --saffron-ink:#4453D9; --saffron-pale:#ECEEFF; }
  [data-accent="teal"]   { --saffron:#0EA5A3; --saffron-ink:#0A8685; --saffron-pale:#E0F5F4; }
  [data-accent="magenta"]{ --saffron:#D93C7A; --saffron-ink:#B62F65; --saffron-pale:#FCE7EF; }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  body {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 30% -10%, #1a1f45 0%, #0b0d1c 55%, #07081a 100%);
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
  }

  /* STAGE — phone + side panel for the floating assistant demo */
  .stage {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    justify-items: center;
    padding: 24px;
    gap: 24px;
  }
  .stage-left, .stage-right {
    display: flex; flex-direction: column; gap: 12px;
    max-width: 280px;
    color: rgba(255,255,255,.75);
  }
  .stage-right { align-items: flex-start; }
  .stage-left { align-items: flex-end; text-align: right; }
  .brand-mark {
    font-family: 'Baloo 2', cursive;
    font-size: 34px; font-weight: 800;
    color: #fff; letter-spacing: -0.5px; line-height: 1;
  }
  .brand-mark span { color: var(--saffron); }
  .brand-tagline {
    font-size: 13px; color: rgba(255,255,255,.55);
    letter-spacing: 0.2px; font-weight: 500;
  }
  .hint-card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 12px 14px;
    font-size: 12px; line-height: 1.55;
    color: rgba(255,255,255,.7);
    backdrop-filter: blur(10px);
  }
  .hint-card b { color: #fff; font-weight: 600; }
  .hint-card kbd {
    font-family: inherit; font-size: 11px;
    background: rgba(255,255,255,.1);
    padding: 1px 6px; border-radius: 4px;
    color: #fff;
  }

  /* PHONE FRAME — Android / Pixel-style */
  .phone-wrap {
    width: 390px; height: 820px;
    position: relative;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,.45));
  }
  .phone {
    width: 100%; height: 100%;
    background: #111425;
    border-radius: 42px;
    padding: 10px;
    position: relative;
  }
  .phone::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 42px;
    border: 1px solid rgba(255,255,255,.08);
    pointer-events: none;
  }
  .screen {
    width: 100%; height: 100%;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    color: var(--ink);
  }
  /* status bar */
  .statusbar {
    height: 32px;
    padding: 8px 24px 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; font-weight: 600;
    color: var(--ink);
    background: var(--bg);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .statusbar svg { display: block; }
  /* camera cutout */
  .cutout {
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #000;
    z-index: 6;
  }

  .app-body {
    flex: 1; min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .nav-hint {
    height: 22px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .nav-hint::after {
    content: ''; width: 128px; height: 4px;
    background: var(--ink); opacity: .5;
    border-radius: 2px;
  }

  /* ---------- Tweaks panel ---------- */
  .tweaks-panel {
    position: fixed;
    right: 20px; bottom: 20px;
    width: 260px;
    background: #15182C;
    color: #fff;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
    font-size: 13px;
    z-index: 1000;
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px;
    color: rgba(255,255,255,.5);
    margin-bottom: 10px;
  }
  .tweaks-row {
    display: flex; gap: 6px;
    margin-bottom: 12px;
  }
  .tweak-btn {
    flex: 1; padding: 8px 10px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.8);
    border-radius: 10px;
    font: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .tweak-btn.active {
    background: var(--saffron);
    color: #fff;
    border-color: var(--saffron);
  }
  .swatch {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform .15s;
  }
  .swatch.active { border-color: #fff; transform: scale(1.05); }

  /* Hide scrollbars but keep scrolling */
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  @media (max-width: 900px) {
    .stage-left, .stage-right { display: none; }
    .stage { grid-template-columns: 1fr; }
  }
</style>
</head>

  { d: 'Sat', v: 1240 },
  { d: 'Sun', v: 1890 },
  { d: 'Mon', v: 650 },
  { d: 'Tue', v: 1100 },
  { d: 'Wed', v: 520 },
  { d: 'Thu', v: 1999 },
];

const DATA = { CATEGORIES, CAT, BUDGETS, TXNS, WEEK, inr, inrDecimal };
window.DATA = DATA;

// ---------- Computed helpers ----------
function monthSpend(txns) {
  return txns.reduce((s, t) => s + t.amount, 0);
}
function byCategory(txns) {
  const m = {};
  txns.forEach(t => { m[t.cat] = (m[t.cat] || 0) + t.amount; });
  return m;
}
function groupByDate(txns) {
  const m = {};
  txns.forEach(t => {
    if (!m[t.date]) m[t.date] = [];
    m[t.date].push(t);
  });
  return Object.entries(m).sort((a,b) => b[0].localeCompare(a[0]));
}
function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  const today = new Date('2026-04-17T00:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}
window.DATA.monthSpend = monthSpend;
window.DATA.byCategory = byCategory;
window.DATA.groupByDate = groupByDate;
window.DATA.formatDate = formatDate;

</script>

          const p = Math.min(100, (sp/bd)*100);
          const over = sp > bd;
          const isEditing = editing === c.key;
          return (
            <div key={c.key} style={{
              background:'var(--surface)', borderRadius:'var(--rs)', padding:'14px',
              border:'1px solid var(--hair)', boxShadow:'var(--shadow-1)'
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:10 }}>
                <CatBadge cat={c.key} size={38}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:'var(--ink)' }}>{c.key}</div>
                  <div style={{ fontSize:12, color: over ? 'var(--red)' : 'var(--muted)', fontWeight:600 }}>
                    {over ? '⚠ Over by ' + D.inr(sp-bd) : D.inr(bd-sp) + ' left'}
                  </div>
                </div>
                {isEditing ? (
                  <input
                    type="number" autoFocus
                    defaultValue={bd}
                    onBlur={e => { setBudgets({ ...budgets, [c.key]: Number(e.target.value) || bd }); setEditing(null); }}
                    onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                    style={{
                      width:90, padding:'6px 10px', fontSize:14, fontWeight:700,
                      border:'1.5px solid var(--saffron)', borderRadius:8,
                      outline:'none', textAlign:'right', fontFamily:"'Baloo 2', cursive", color:'var(--ink)',
                      background: 'var(--surface)'
                    }}
                  />
                ) : (
                  <div onClick={() => setEditing(c.key)} style={{ textAlign:'right', cursor:'pointer' }}>
                    <div style={{ fontFamily:"'Baloo 2', cursive", fontSize:16, fontWeight:700, color:'var(--ink)' }}>{D.inr(sp)}</div>
                    <div style={{ fontSize:11, color:'var(--muted)' }}>of {D.inr(bd)} ✎</div>
                  </div>
                )}
              </div>
              <div style={{ height:6, background:'var(--chip)', borderRadius:99, overflow:'hidden' }}>
                <div style={{
                  width: p + '%', height:'100%',
                  background: over ? 'var(--red)' : (p > 80 ? 'var(--amber)' : c.tint),
                  borderRadius:99, transition:'width .6s'
                }}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RingChart({ value, total }) {
  const pct = Math.min(1, value/total);
  const R = 34, C = 2 * Math.PI * R;
  return (
    <div style={{ position:'relative', width:90, height:90 }}>
      <svg width={90} height={90} viewBox="0 0 90 90" style={{ transform:'rotate(-90deg)' }}>
        <circle cx="45" cy="45" r={R} fill="none" stroke="var(--chip)" strokeWidth="8"/>
        <circle cx="45" cy="45" r={R} fill="none" stroke="var(--saffron)" strokeWidth="8"
          strokeDasharray={C} strokeDashoffset={C * (1 - pct)} strokeLinecap="round"
          style={{ transition:'stroke-dashoffset .8s' }}/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
        <div style={{ fontFamily:"'Baloo 2', cursive", fontSize:20, fontWeight:800, color:'var(--ink)', lineHeight:1 }}>{Math.round(pct*100)}%</div>
        <div style={{ fontSize:10, color:'var(--muted)', fontWeight:600, marginTop:2 }}>used</div>
      </div>
    </div>
  );
}

function topMerchants(txns) {
  const m = {};
  txns.forEach(t => {

    m[t.merchant].total += t.amount;
    m[t.merchant].count++;
  });
  return Object.values(m).sort((a,b) => b.total - a.total);
}

function DonutChart({ entries, total }) {
  const D = window.DATA;
  const R = 42, CX = 55, CY = 55;
  let angle = -Math.PI/2;
  const paths = entries.map(([cat, v]) => {
    const frac = v / total;
    const a2 = angle + frac * 2 * Math.PI;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = CX + R * Math.cos(angle), y1 = CY + R * Math.sin(angle);
    const x2 = CX + R * Math.cos(a2), y2 = CY + R * Math.sin(a2);
    const d = `M ${CX} ${CY} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} Z`;
    angle = a2;
    return <path key={cat} d={d} fill={D.CAT[cat].tint}/>;
  });
  return (
    <div style={{ position:'relative', width:110, height:110, flexShrink:0 }}>
      <svg width="110" height="110" viewBox="0 0 110 110">
        {paths}
        <circle cx={CX} cy={CY} r="22" fill="var(--surface)"/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
        <div style={{ fontSize:10, color:'var(--muted)', fontWeight:700, textTransform:'uppercase', letterSpacing:'.5px' }}>Total</div>

      </div>
    </div>
  );
}

<script type="text/babel" data-presets="react">
// Floating AI assistant with real Claude integration + streaming-ish typing
const { useState: useSt, useRef: useR, useEffect: useEf } = React;

const SUGGESTED = [
  'How can I save more?',
  'How can I improve my credit score?',
  'How can I invest more?',
  'Where am I overspending?',
];

function buildContext() {
  const D = window.DATA;
  const byCat = D.byCategory(D.TXNS);
  const total = D.monthSpend(D.TXNS);
  const totalBudget = Object.values(D.BUDGETS).reduce((a,b)=>a+b,0);
  return `You are Paisa, a friendly personal-finance assistant for an Indian user. Respond in 2-4 short sentences. Use ₹ for amounts. Be specific, reference the user's actual spending below. Never invent numbers.

USER'S APRIL 2026 SPENDING:
- Total spent: ₹${total.toLocaleString('en-IN')} of ₹${totalBudget.toLocaleString('en-IN')} budget
- Days covered: 1–17 April (${Math.round((total/17)).toLocaleString('en-IN')}/day avg)
- By category: ${Object.entries(byCat).map(([k,v]) => `${k} ₹${v.toLocaleString('en-IN')} (budget ₹${D.BUDGETS[k].toLocaleString('en-IN')})`).join(', ')}
- Recurring subscriptions: Netflix ₹649, Spotify ₹119, Cult.fit ₹1499 = ₹2,267/mo
- Top merchants: Landlord ₹22000, Amazon ₹3789, Zomato ₹1395, Swiggy Instamart ₹742

Respond conversationally. If asked unrelated things, politely steer back to money.`;
}

function FloatingAssistant({ open, onClose }) {
  const I = window.I, D = window.DATA;
  const [msgs, setMsgs] = useSt([
    { role: 'assistant', text: "Hi Arjun 👋 I can see you've spent ₹" + D.monthSpend(D.TXNS).toLocaleString('en-IN') + " this month. What would you like to know?" }
  ]);
  const [input, setInput] = useSt('');
  const [loading, setLoading] = useSt(false);
  const scrollRef = useR(null);
  const typingRef = useR(null);

  useEf(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [msgs, loading]);

  const send = async (text) => {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput('');
    const history = [...msgs, { role: 'user', text: q }];
    setMsgs(history);
    setLoading(true);

    try {
      const apiMessages = history.map(m => ({
        role: m.role === 'assistant' ? 'assistant' : 'user',
        content: m.text
      }));
      apiMessages.unshift({ role: 'user', content: buildContext() });
      apiMessages.splice(1, 0, { role: 'assistant', content: 'Understood. I\'ll help with your money questions using your real data.' });

      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages })
      });
      const { reply } = await r.json();
      // Typewriter reveal
      setMsgs(m => [...m, { role: 'assistant', text: '' }]);
      setLoading(false);
      let i = 0;
      clearInterval(typingRef.current);
      typingRef.current = setInterval(() => {
        i += 2;
        setMsgs(m => {
          const nm = [...m];
          nm[nm.length - 1] = { role: 'assistant', text: reply.slice(0, i) };
          return nm;
        });
        if (i >= reply.length) clearInterval(typingRef.current);
      }, 14);
    } catch (e) {
      setLoading(false);
      setMsgs(m => [...m, { role: 'assistant', text: "Hmm, I couldn't reach the AI just now. Try again in a moment." }]);
    }
  };

  if (!open) return null;

  return (
    <div style={{
      position:'absolute', inset:0, zIndex: 40,
      display:'flex', flexDirection:'column',
      background: 'rgba(15,18,38,.45)',
      backdropFilter: 'blur(4px)',
      animation:'fadeIn .2s ease'
    }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        marginTop:'auto',
        background:'var(--surface)',
        borderRadius:'24px 24px 0 0',
        height:'82%',
        display:'flex', flexDirection:'column',
        animation:'slideUp .3s ease',
        overflow:'hidden',
      }}>
        {/* Handle + header */}
        <div style={{ padding:'14px 18px 6px', flexShrink:0 }}>
          <div style={{ width:40, height:4, background:'var(--hair)', borderRadius:99, margin:'0 auto 14px' }}/>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{
              width:40, height:40, borderRadius:12,
              background:'linear-gradient(135deg, var(--saffron), var(--saffron-ink))',
              color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 6px 18px -6px var(--saffron)'
            }}>
              <I.Sparkles size={20}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--ink)' }}>Ask Paisa</div>
              <div style={{ fontSize:12, color:'var(--muted)', display:'flex', alignItems:'center', gap:6 }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--green)' }}/>
                AI · reads your spending
              </div>
            </div>
            <button onClick={onClose} style={{
              width:34, height:34, borderRadius:'50%',
              background:'var(--chip)', border:'none', color:'var(--ink)',
              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'
            }}>
              <I.X size={16}/>
            </button>
          </div>
        </div>

        {/* Messages */}
        <div ref={scrollRef} className="scroll" style={{
          flex:1, overflowY:'auto', padding:'16px 18px 10px',
          display:'flex', flexDirection:'column', gap:12
        }}>
          {msgs.map((m, i) => <Bubble key={i} role={m.role} text={m.text}/>)}
          {loading && <Bubble role="assistant" text="" typing/>}
        </div>

        {/* Suggested */}
        {msgs.length <= 2 && (
          <div className="scroll" style={{
            display:'flex', gap:6, padding:'4px 18px 10px',
            overflowX:'auto', flexShrink:0
          }}>
            {SUGGESTED.map(s => (
              <button key={s} onClick={() => send(s)} style={{
                flexShrink:0, padding:'8px 12px', borderRadius:99,
                background:'var(--chip)', border:'1px solid var(--hair)',
                color:'var(--ink-2)', fontSize:12, fontWeight:600,
                cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap'
              }}>{s}</button>
            ))}
          </div>
        )}

        {/* Input */}
        <div style={{ padding:'10px 14px 16px', flexShrink:0, borderTop:'1px solid var(--hair)', background:'var(--surface)' }}>
          <div style={{
            display:'flex', alignItems:'center', gap:8,
            background:'var(--chip)', borderRadius:16, padding:'8px 8px 8px 16px',
          }}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && send()}
              placeholder="Ask about your spending…"
              style={{
                flex:1, border:'none', outline:'none', background:'transparent',
                color:'var(--ink)', fontSize:14, fontFamily:'inherit', padding:'6px 0'
              }}
            />
            <button onClick={() => send()} disabled={!input.trim() || loading} style={{
              width:36, height:36, borderRadius:'50%',
              background: input.trim() ? 'var(--saffron)' : 'var(--hair)',
              color:'#fff', border:'none', cursor: input.trim() ? 'pointer' : 'default',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'background .15s'
            }}>
              <I.Send size={15}/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Bubble({ role, text, typing }) {
  const isUser = role === 'user';
  return (
    <div style={{ display:'flex', justifyContent: isUser ? 'flex-end' : 'flex-start' }}>
      <div style={{
        maxWidth:'82%',
        padding:'10px 14px',
        borderRadius: isUser ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
        background: isUser ? 'var(--saffron)' : 'var(--chip)',
        color: isUser ? '#fff' : 'var(--ink)',
        fontSize:14, lineHeight:1.55, whiteSpace:'pre-wrap',
        wordBreak:'break-word'
      }}>
        {typing ? <TypingDots/> : text}
      </div>
    </div>
  );
}

function TypingDots() {
  return (
    <div style={{ display:'flex', gap:4, padding:'2px 0' }}>
      {[0,1,2].map(i => (
        <div key={i} style={{
          width:6, height:6, borderRadius:'50%', background:'var(--muted)',
          animation:`bounce 1.2s ${i*0.15}s infinite`
        }}/>
      ))}
    </div>
  );
}

if (!document.getElementById('assist-kf')) {
  const s = document.createElement('style');
  s.id = 'assist-kf';
  s.textContent = `@keyframes bounce { 0%,60%,100% { opacity:.3; transform:translateY(0); } 30% { opacity:1; transform:translateY(-4px); } }`;
  document.head.appendChild(s);
}

// Floating action button
function AssistantFAB({ onClick }) {
  const I = window.I;
  return (
    <button onClick={onClick} style={{
      position:'absolute', right:18, bottom:78,
      width:58, height:58, borderRadius:'50%',
      background:'linear-gradient(135deg, var(--saffron), var(--saffron-ink))',
      color:'#fff', border:'none', cursor:'pointer',
      display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow:'0 12px 28px -8px var(--saffron), 0 4px 10px rgba(0,0,0,.2)',
      zIndex: 20,
      animation: 'pulseFab 3s ease-in-out infinite'
    }}>
      <I.Sparkles size={24} stroke="#fff" strokeWidth={2}/>
      <span style={{
        position:'absolute', top:-2, right:-2,
        width:14, height:14, borderRadius:'50%',
        background:'var(--green)', border:'2px solid var(--bg)'
      }}/>
    </button>
  );
}

if (!document.getElementById('fab-kf')) {
  const s = document.createElement('style');
  s.id = 'fab-kf';
  s.textContent = `@keyframes pulseFab { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }`;
  document.head.appendChild(s);
}

Object.assign(window, { FloatingAssistant, AssistantFAB });

</script>

const { useState } = React;

function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [email, setEmail] = useState('');
  const [scriptUrl, setScriptUrl] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [connecting, setConnecting] = useState(false);
  const [connected, setConnected] = useState(false);

  const doConnect = () => {
    setConnecting(true);
    setTimeout(() => {
      setConnecting(false);
      setConnected(true);
      setTimeout(() => setStep(2), 800);
    }, 1500);
  };

  const done = () => {
    localStorage.setItem('paisa_email', email || 'you@gmail.com');
    localStorage.setItem('paisa_script_url', scriptUrl);
    onComplete({ email: email || 'you@gmail.com', scriptUrl, apiKey });
  };

  return (
    <div style={{
      position:'absolute', inset:0, background:'var(--bg)',
      display:'flex', flexDirection:'column',
      padding:'24px 24px 28px',
      animation:'fadeIn .3s ease'
    }}>
      {/* Progress dots */}
      <div style={{ display:'flex', gap:6, marginBottom:32 }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            flex: i <= step ? 2 : 1,
            height: 4,
            borderRadius: 99,
            background: i <= step ? 'var(--saffron)' : 'var(--hair)',
            transition: 'all .3s'
          }}/>
        ))}
      </div>

      {step === 0 && <StepWelcome onNext={() => setStep(1)} />}
      {step === 1 && <StepGmail
        email={email} setEmail={setEmail}
        scriptUrl={scriptUrl} setScriptUrl={setScriptUrl}
        connecting={connecting} connected={connected}
        doConnect={doConnect}
        onBack={() => setStep(0)}
      />}
      {step === 2 && <StepApiKey
        apiKey={apiKey} setApiKey={setApiKey}
        onNext={() => setStep(3)}
        onBack={() => setStep(1)}
      />}
      {step === 3 && <StepReady onDone={done} email={email || 'you@gmail.com'} />}
    </div>
  );
}

<!-- app.jsx -->
<script type="text/babel" data-presets="react">
// Main app shell — tabs, theme, onboarding gate, assistant mount
const { useState: uS, useEffect: uE } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "saffron"
}/*EDITMODE-END*/;

function App() {
  const [active, setActive] = uS('home');
  const [onboarded, setOnboarded] = uS(false);
  const [assistantOpen, setAssistantOpen] = uS(false);
  const [theme, setTheme] = uS(TWEAKS.theme);
  const [accent, setAccent] = uS(TWEAKS.accent);
  const [tweaksOpen, setTweaksOpen] = uS(false);

  // Apply theme + accent to screen container
  uE(() => {
    const el = document.getElementById('paisa-screen');
    if (el) {
      el.setAttribute('data-theme', theme);
      el.setAttribute('data-accent', accent);
    }
  }, [theme, accent]);

  // Tweaks integration
  uE(() => {
    const listener = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', listener);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', listener);
  }, []);

  const persist = (patch) => {
    const next = { theme, accent, ...patch };
    if (patch.theme) setTheme(patch.theme);
    if (patch.accent) setAccent(patch.accent);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  return (
    <div className="stage">
      <div className="stage-left">
        <div className="brand-mark">Paisa<span>.</span></div>
        <div className="brand-tagline">आपका पैसा, साफ़ दिखे</div>
        <div className="hint-card">
          <b>Interactive prototype.</b> Tap the ✨ assistant bubble or any nav tab. Budget rows are editable.
        </div>
      </div>

      <div className="phone-wrap">
        <div className="phone">
          <div className="screen" id="paisa-screen" data-theme={theme} data-accent={accent}>
            <div className="cutout"/>
            <div className="statusbar">
              <span>9:41</span>
              <div className="icons">
                {/* Signal */}
                <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx=".5"/><rect x="4" y="6" width="3" height="6" rx=".5"/><rect x="8" y="3" width="3" height="9" rx=".5"/><rect x="12" y="0" width="3" height="12" rx=".5"/></svg>
                {/* Wifi */}
                <svg width="15" height="11" viewBox="0 0 15 11" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M1 4a10 10 0 0113 0"/><path d="M3.5 6.5a6 6 0 018 0"/><circle cx="7.5" cy="9" r="1" fill="currentColor"/></svg>
                {/* Battery */}
                <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x=".5" y=".5" width="18" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="14" height="7" rx="1" fill="currentColor"/><rect x="20" y="3.5" width="1.5" height="4" rx=".5" fill="currentColor"/></svg>
              </div>
            </div>

            <div className="app-body">
              {!onboarded ? (
                <window.Onboarding onComplete={() => setOnboarded(true)}/>
              ) : (
                <>
                  <window.AppScreens
                    active={active}
                    onNav={setActive}
                    onOpenAssistant={() => setAssistantOpen(true)}
                    onReset={() => setOnboarded(false)}
                  />
                  <BottomNav active={active} onChange={setActive}/>
                  {!assistantOpen && <window.AssistantFAB onClick={() => setAssistantOpen(true)}/>}
                  <window.FloatingAssistant open={assistantOpen} onClose={() => setAssistantOpen(false)}/>
                </>
              )}
            </div>

            <div className="nav-hint"/>
          </div>
        </div>
      </div>

      <div className="stage-right">
        <div className="hint-card">
          <b>✨ Ask Paisa</b> — the floating bubble is wired to real AI and knows your transactions. Try "Where am I overspending?"
        </div>
        <div className="hint-card">
          <b>Tweaks:</b> toggle the <kbd>Tweaks</kbd> button in the toolbar to change theme & accent color.
        </div>
        <div className="hint-card" style={{ opacity:.75 }}>
          All data is mock. No real Gmail or accounts are touched.
        </div>
      </div>

      {/* Tweaks panel */}
      <div className={'tweaks-panel' + (tweaksOpen ? ' open' : '')}>
        <div className="tweaks-title">Theme</div>
        <div className="tweaks-row">
          {['light','dark'].map(t => (
            <button key={t} className={'tweak-btn' + (theme===t ? ' active' : '')} onClick={() => persist({ theme: t })}>
              {t === 'light' ? '☀ Light' : '☾ Dark'}
            </button>
          ))}
        </div>
        <div className="tweaks-title">Accent</div>
        <div className="tweaks-row">
          {[
            { k:'saffron',  c:'#FF6B35' },
            { k:'indigo',   c:'#5B6CFF' },
            { k:'teal',     c:'#0EA5A3' },
            { k:'magenta',  c:'#D93C7A' },
          ].map(s => (
            <div key={s.k}
              className={'swatch' + (accent===s.k ? ' active' : '')}
              style={{ background: s.c, flex:1 }}
              onClick={() => persist({ accent: s.k })}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

// Bottom navigation
function BottomNav({ active, onChange }) {
  const I = window.I;
  const items = [
    { k:'home',     icon:'Home',     label:'Home' },
    { k:'txns',     icon:'List',     label:'Activity' },
    { k:'budget',   icon:'Target',   label:'Budget' },
    { k:'insights', icon:'Chart',    label:'Insights' },
    { k:'settings', icon:'Settings', label:'Settings' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      background:'var(--surface)', borderTop:'1px solid var(--hair)',
      padding:'8px 8px 10px',
      display:'flex', justifyContent:'space-around',
      zIndex: 15
    }}>
      {items.map(it => {
        const Ico = I[it.icon];
        const isActive = active === it.k;
        return (
          <button key={it.k} onClick={() => onChange(it.k)} style={{
            flex:1, background:'transparent', border:'none',
            cursor:'pointer', padding:'6px 4px',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            fontFamily:'inherit'
          }}>
            <Ico size={22} stroke={isActive ? 'var(--saffron)' : 'var(--muted)'} strokeWidth={isActive ? 2.2 : 1.75}/>
            <span style={{
              fontSize:10, fontWeight: isActive ? 700 : 500,
              color: isActive ? 'var(--saffron)' : 'var(--muted)',
              letterSpacing:'.2px'
            }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>


</body>
